<!DOCTYPE html>
<html lang="en">

<head>

    content="WildRidge Adventures offers guided outdoor experiences, thrilling adventure packages, and expert-led tours for explorers who want to push their limits and discover the wild.">

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <!-- Navigation -->

  <div id="exnavbar" >

  </div>
  <main>
    <!-- driving package section -->
    <section id="driving" aria-label="Driving section">

    </section>
  </main>

  <!-- javascript files should be placed at the end of the body to ensure that the HTML content loads first, improving page load performance and user experience. -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/script.js"></script>

<script src="https://kit.fontawesome.com/3b20d96fa9.js" crossorigin="anonymous"></script>
  <script>
  fetch('/navbar.html')
    .then(r => r.text())
    .then(html => {
      const nav = document.getElementById('exnavbar');
      nav.innerHTML = html;
      nav.classList.add('loaded');

      initNavbar(); // navbar now exists → safe to bind events
    });
</script>



</body>

</html>
