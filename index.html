<!DOCTYPE html>
<html data-theme="light" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WildRidge Adventures offers guided outdoor experiences, thrilling adventure packages, 
    and expert-led tours for explorers who want to push their limits and discover the wild.">
  <title>index</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <div id="themeToggle" class="theme-toggle">
    🌙
  </div>

  <!-- Navigation -->
  <div id="exnavbar"></div>
  <main>
    <!-- The hero section is designed to welcome visitors to the website and provide a brief introduction to the brand. 
     It includes a heading and two paragraphs of text, all contained within an overlay for visual emphasis. 
     The section is labeled with ARIA attributes for accessibility. -->
    <section id="hero" class="hero" aria-label="Welcome section">
      <div class="overlay">
        <h1>Welcome to WildRidge Adventures</h1>
      </div>
      <div class="overlay">
        <p>Dare to explore!</p>
        <p>Discover the thrill of outdoor adventures with us!</p>
      </div>
    </section>
  </main>
  <!-- javascript files should be placed at the end of the body to ensure that the HTML content loads first, improving page load performance and user experience. -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <script src="https://kit.fontawesome.com/3b20d96fa9.js" crossorigin="anonymous"></script>

  <script src="assets/js/script.js"></script>

</html>
