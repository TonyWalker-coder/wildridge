<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="WildRidge Adventures offers guided outdoor experiences, thrilling adventure packages, and expert-led tours for explorers who want to push their limits and discover the wild.">
  <title>hiking</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <!-- Navigation -->

  <div id="exnavbar" >

  </div>
  <main>
    <!-- hiking package section -->
    <section id="hiking" aria-label="Driving section">

      <div class="card-container packagewrapper" role="list">
        <div class="col-12 col-lg-4" role="listitem">
          <img src="assets/images/hik7.jpg" width="100%" alt="two hikers making their way down a valley">
        </div>
        <div class="col-12 col-lg-4" role="listitem">
          <img src="assets/images/hiking centre.jpg" width="100%" alt="">
        </div>
        <div class="col-12 col-lg-4" role="listitem">         
          <img src="assets/images/hik6.jpg" width="100%" alt="group of hikers out lined against a snow capped mountain">
        </div>
      </div>

    </section>
  </main>

  <!-- javascript files should be placed at the end of the body to ensure that the HTML content loads first, improving page load performance and user experience. -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/script.js"></script>

<script src="https://kit.fontawesome.com/3b20d96fa9.js" crossorigin="anonymous"></script>
  <script>
  fetch('navbar.html')
    .then(r => r.text())
    .then(html => {
      const nav = document.getElementById('exnavbar');
      nav.innerHTML = html;
      nav.classList.add('loaded');

      initNavbar(); // navbar now exists → safe to bind events
    });
</script>



</body>

</html>
